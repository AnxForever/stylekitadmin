<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Warm paper background -->
    <linearGradient id="wabiPaper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7f3ec"/>
      <stop offset="50%" style="stop-color:#f2ede4"/>
      <stop offset="100%" style="stop-color:#ede5d4"/>
    </linearGradient>
    <!-- Subtle aged spot -->
    <radialGradient id="wabiAge" cx="30%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#b5a78c; stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#f2ede4; stop-opacity:0"/>
    </radialGradient>
    <!-- Vignette -->
    <radialGradient id="wabiVignette" cx="50%" cy="50%" r="70%">
      <stop offset="55%" style="stop-color:transparent"/>
      <stop offset="100%" style="stop-color:#3a3a3a; stop-opacity:0.07"/>
    </radialGradient>
    <!-- Brush stroke gradient -->
    <linearGradient id="inkStroke" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3a3a3a; stop-opacity:0"/>
      <stop offset="15%" style="stop-color:#3a3a3a; stop-opacity:0.7"/>
      <stop offset="85%" style="stop-color:#3a3a3a; stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#3a3a3a; stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="inkStrokeLight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3a3a3a; stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#3a3a3a; stop-opacity:0.15"/>
      <stop offset="80%" style="stop-color:#3a3a3a; stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#3a3a3a; stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#wabiPaper)"/>
  <rect width="1200" height="630" fill="url(#wabiAge)"/>
  <rect width="1200" height="630" fill="url(#wabiVignette)"/>

  <!-- Very thin border — ultra-light -->
  <rect x="50" y="50" width="1100" height="530" fill="none" stroke="#d4cdc5" stroke-width="0.8" opacity="0.4"/>

  <!-- Left side: large ink-brush stroke decoration (abstract — moss/bamboo) -->
  <g transform="translate(80, 50)" opacity="0.35">
    <!-- Bamboo stalk 1 -->
    <path d="M 45 530 C 43 480 48 430 44 380 C 41 330 46 280 43 230 C 40 180 45 130 42 80 C 40 55 43 30 44 10" fill="none" stroke="#3a3a3a" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Nodes -->
    <ellipse cx="44" cy="380" rx="6" ry="3" fill="none" stroke="#3a3a3a" stroke-width="1.5"/>
    <ellipse cx="43" cy="230" rx="6" ry="3" fill="none" stroke="#3a3a3a" stroke-width="1.5"/>
    <ellipse cx="44" cy="105" rx="6" ry="3" fill="none" stroke="#3a3a3a" stroke-width="1.5"/>
    <!-- Branch leaves left stalk -->
    <path d="M 44 340 Q 15 320 8 295 Q 28 312 44 332 Z" fill="#8a9a7b" opacity="0.8"/>
    <path d="M 8 295 Q 20 308 44 332" fill="none" stroke="#3a3a3a" stroke-width="0.5" opacity="0.6"/>
    <path d="M 43 180 Q 14 158 8 132 Q 26 150 43 172 Z" fill="#8a9a7b" opacity="0.75"/>
    <path d="M 43 50 Q 18 35 16 12 Q 32 26 43 43 Z" fill="#8a9a7b" opacity="0.7"/>

    <!-- Bamboo stalk 2 (thinner, behind) -->
    <path d="M 25 530 C 24 490 26 450 24 410 C 22 370 25 330 23 290 C 21 250 24 210 22 170 C 20 140 22 110 23 85" fill="none" stroke="#3a3a3a" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <ellipse cx="23" cy="290" rx="4" ry="2" fill="none" stroke="#3a3a3a" stroke-width="1" opacity="0.5"/>
    <path d="M 23 250 Q 4 235 0 215 Q 14 228 23 244 Z" fill="#8a9a7b" opacity="0.6"/>
  </g>

  <!-- Right side: Wabi stone/circle motif — Enso (Zen circle) -->
  <g transform="translate(950, 160)" opacity="0.18">
    <!-- Enso brush circle — imperfect, hand-drawn feel -->
    <path d="M 130 10 C 180 8 230 40 248 90 C 266 140 255 200 230 240 C 205 280 160 300 115 298 C 70 296 28 272 12 232 C -4 192 2 140 25 100 C 48 60 90 20 130 10" fill="none" stroke="#3a3a3a" stroke-width="12" stroke-linecap="round"/>
  </g>

  <!-- Scattered ink dots / imperfections -->
  <circle cx="380" cy="88" r="2" fill="#3a3a3a" opacity="0.08"/>
  <circle cx="820" cy="542" r="1.5" fill="#3a3a3a" opacity="0.07"/>
  <circle cx="950" cy="120" r="3" fill="#8a9a7b" opacity="0.1"/>
  <circle cx="240" cy="500" r="2" fill="#b5a78c" opacity="0.12"/>

  <!-- Horizontal ink divider lines (calligraphy-inspired) -->
  <rect x="200" y="180" width="800" height="1" fill="url(#inkStroke)" opacity="0.6"/>
  <rect x="200" y="450" width="800" height="1" fill="url(#inkStrokeLight)" opacity="0.8"/>

  <!-- Main content — extreme whitespace, centered -->
  <g text-anchor="middle">
    <!-- Japanese characters — top, very small -->
    <text x="600" y="140" font-family="serif" font-size="16" fill="#8a9a7b" letter-spacing="12" opacity="0.55">不 完 美 之 美</text>

    <!-- Ma spacing dots -->
    <circle cx="550" cy="168" r="1.5" fill="#b5a78c" opacity="0.4"/>
    <circle cx="600" cy="168" r="1.5" fill="#b5a78c" opacity="0.4"/>
    <circle cx="650" cy="168" r="1.5" fill="#b5a78c" opacity="0.4"/>

    <!-- Main title — ink-like, slightly imperfect -->
    <text x="600" y="268" font-family="Georgia, 'Times New Roman', serif" font-size="90" font-weight="400" fill="#3a3a3a" letter-spacing="8" opacity="0.82">Wabi-Sabi</text>

    <!-- Japanese pronunciation — ultra small, moss green -->
    <text x="600" y="308" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-style="italic" fill="#8a9a7b" letter-spacing="6" opacity="0.5">侘寂</text>

    <!-- Subtitle — very light, wide tracking -->
    <text x="600" y="368" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="400" fill="#3a3a3a" letter-spacing="6" opacity="0.4">Nothing lasts, nothing is finished</text>
    <text x="600" y="396" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="400" fill="#3a3a3a" letter-spacing="6" opacity="0.4">nothing is perfect</text>

    <!-- Lower section: three tenets -->
    <text x="600" y="488" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#8a8278" letter-spacing="8" opacity="0.5">間  ·  MA  ·  EMPTINESS  ·  一期一会</text>

    <!-- Bottom attribution -->
    <text x="600" y="560" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#3a3a3a" letter-spacing="5" opacity="0.25">STYLEKIT  ·  WABI-SABI  ·  VISUAL DESIGN</text>
  </g>

  <!-- Small wabi ceramic crack motif — bottom left -->
  <g transform="translate(180, 460)" opacity="0.2">
    <path d="M 0 0 Q 8 10 5 25 Q 12 18 18 30" fill="none" stroke="#8b6f4e" stroke-width="1" stroke-linecap="round"/>
    <path d="M 5 25 Q 2 35 8 45" fill="none" stroke="#8b6f4e" stroke-width="0.8" stroke-linecap="round"/>
  </g>
  <!-- Moss color swatch dots — bottom right, minimal -->
  <g transform="translate(920, 540)" opacity="0.3">
    <circle cx="0" cy="0" r="5" fill="#8a9a7b"/>
    <circle cx="18" cy="0" r="5" fill="#b5a78c"/>
    <circle cx="36" cy="0" r="5" fill="#8b6f4e"/>
    <circle cx="54" cy="0" r="5" fill="#3a3a3a" opacity="0.5"/>
  </g>
</svg>
