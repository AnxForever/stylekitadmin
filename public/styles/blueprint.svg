<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#1e3a5f"/>
  <!-- Grid lines -->
  <g stroke="#4a90d9" opacity="0.15" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/><line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="200" x2="800" y2="200"/><line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="280" x2="800" y2="280"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="80" y1="0" x2="80" y2="400"/><line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/><line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="560" y1="0" x2="560" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
    <line x1="720" y1="0" x2="720" y2="400"/>
  </g>
  <!-- Major grid -->
  <g stroke="#4a90d9" opacity="0.25" stroke-width="0.8">
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
  </g>
  <!-- Technical drawing: rectangle with dimensions -->
  <rect x="180" y="100" width="200" height="120" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  <!-- Dimension arrows horizontal -->
  <line x1="180" y1="250" x2="380" y2="250" stroke="#ffffff" stroke-width="0.8"/>
  <line x1="180" y1="245" x2="180" y2="255" stroke="#ffffff" stroke-width="0.8"/>
  <line x1="380" y1="245" x2="380" y2="255" stroke="#ffffff" stroke-width="0.8"/>
  <!-- Arrow heads -->
  <polygon points="185,250 180,247 180,253" fill="#ffffff"/>
  <polygon points="375,250 380,247 380,253" fill="#ffffff"/>
  <text x="280" y="265" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff">200</text>
  <!-- Dimension arrows vertical -->
  <line x1="410" y1="100" x2="410" y2="220" stroke="#ffffff" stroke-width="0.8"/>
  <line x1="405" y1="100" x2="415" y2="100" stroke="#ffffff" stroke-width="0.8"/>
  <line x1="405" y1="220" x2="415" y2="220" stroke="#ffffff" stroke-width="0.8"/>
  <polygon points="410,105 407,100 413,100" fill="#ffffff"/>
  <polygon points="410,215 407,220 413,220" fill="#ffffff"/>
  <text x="430" y="165" font-family="monospace" font-size="11" fill="#ffffff">120</text>
  <!-- Circle detail -->
  <circle cx="600" cy="160" r="60" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="600" y1="160" x2="660" y2="160" stroke="#ffffff" stroke-width="0.8" stroke-dasharray="4 2"/>
  <text x="630" y="155" font-family="monospace" font-size="10" fill="#ffffff">R60</text>
  <!-- Center mark -->
  <line x1="595" y1="160" x2="605" y2="160" stroke="#ffffff" stroke-width="0.6"/>
  <line x1="600" y1="155" x2="600" y2="165" stroke="#ffffff" stroke-width="0.6"/>
  <!-- Dashed construction lines -->
  <line x1="280" y1="100" x2="280" y2="60" stroke="#4a90d9" stroke-width="0.6" stroke-dasharray="6 3"/>
  <line x1="600" y1="100" x2="600" y2="60" stroke="#4a90d9" stroke-width="0.6" stroke-dasharray="6 3"/>
  <line x1="180" y1="160" x2="140" y2="160" stroke="#4a90d9" stroke-width="0.6" stroke-dasharray="6 3"/>
  <!-- Title block bottom right -->
  <rect x="520" y="300" width="250" height="70" fill="none" stroke="#ffffff" stroke-width="1"/>
  <line x1="520" y1="330" x2="770" y2="330" stroke="#ffffff" stroke-width="0.5"/>
  <line x1="520" y1="355" x2="770" y2="355" stroke="#ffffff" stroke-width="0.5"/>
  <text x="645" y="322" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#ffffff">BLUEPRINT</text>
  <text x="645" y="348" text-anchor="middle" font-family="monospace" font-size="10" fill="#4a90d9">TECHNICAL DRAWING STYLE</text>
  <text x="645" y="367" text-anchor="middle" font-family="monospace" font-size="9" fill="#4a90d9">SCALE 1:1 | REV A</text>
</svg>