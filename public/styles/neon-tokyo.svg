<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#0a0a1a"/>
  <!-- Rain effect -->
  <line x1="50" y1="0" x2="50" y2="20" stroke="#00f0ff" stroke-width="0.5" opacity="0.3"/>
  <line x1="120" y1="30" x2="120" y2="55" stroke="#00f0ff" stroke-width="0.5" opacity="0.2"/>
  <line x1="200" y1="10" x2="200" y2="35" stroke="#00f0ff" stroke-width="0.5" opacity="0.25"/>
  <line x1="310" y1="20" x2="310" y2="50" stroke="#00f0ff" stroke-width="0.5" opacity="0.2"/>
  <line x1="450" y1="5" x2="450" y2="30" stroke="#00f0ff" stroke-width="0.5" opacity="0.3"/>
  <line x1="560" y1="15" x2="560" y2="40" stroke="#00f0ff" stroke-width="0.5" opacity="0.2"/>
  <line x1="670" y1="0" x2="670" y2="25" stroke="#00f0ff" stroke-width="0.5" opacity="0.25"/>
  <line x1="750" y1="25" x2="750" y2="50" stroke="#00f0ff" stroke-width="0.5" opacity="0.2"/>
  <line x1="90" y1="60" x2="90" y2="85" stroke="#bc13fe" stroke-width="0.5" opacity="0.2"/>
  <line x1="380" y1="50" x2="380" y2="80" stroke="#bc13fe" stroke-width="0.5" opacity="0.15"/>
  <line x1="620" y1="40" x2="620" y2="70" stroke="#bc13fe" stroke-width="0.5" opacity="0.2"/>
  <!-- City skyline silhouettes -->
  <rect x="0" y="280" width="60" height="120" fill="#12122a"/>
  <rect x="65" y="240" width="45" height="160" fill="#0f0f25"/>
  <rect x="115" y="260" width="55" height="140" fill="#12122a"/>
  <rect x="175" y="220" width="40" height="180" fill="#0f0f25"/>
  <rect x="220" y="250" width="50" height="150" fill="#12122a"/>
  <rect x="530" y="240" width="50" height="160" fill="#12122a"/>
  <rect x="585" y="210" width="40" height="190" fill="#0f0f25"/>
  <rect x="630" y="260" width="55" height="140" fill="#12122a"/>
  <rect x="690" y="230" width="45" height="170" fill="#0f0f25"/>
  <rect x="740" y="250" width="60" height="150" fill="#12122a"/>
  <!-- Building windows -->
  <rect x="10" y="290" width="5" height="5" fill="#ff1493" opacity="0.4"/>
  <rect x="25" y="300" width="5" height="5" fill="#00f0ff" opacity="0.3"/>
  <rect x="40" y="310" width="5" height="5" fill="#ff1493" opacity="0.3"/>
  <rect x="75" y="255" width="5" height="5" fill="#00f0ff" opacity="0.4"/>
  <rect x="85" y="270" width="5" height="5" fill="#bc13fe" opacity="0.3"/>
  <rect x="545" y="260" width="5" height="5" fill="#ff1493" opacity="0.3"/>
  <rect x="560" y="280" width="5" height="5" fill="#00f0ff" opacity="0.4"/>
  <rect x="700" y="250" width="5" height="5" fill="#bc13fe" opacity="0.3"/>
  <rect x="715" y="265" width="5" height="5" fill="#ff1493" opacity="0.4"/>
  <!-- Neon sign frame -->
  <rect x="290" y="100" width="220" height="80" rx="8" fill="none" stroke="#ff1493" stroke-width="3" opacity="0.8"/>
  <rect x="290" y="100" width="220" height="80" rx="8" fill="#ff1493" opacity="0.05"/>
  <!-- Neon glow effect -->
  <rect x="285" y="95" width="230" height="90" rx="10" fill="none" stroke="#ff1493" stroke-width="1" opacity="0.3"/>
  <!-- Neon text -->
  <text x="400" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#ff1493">NEON</text>
  <!-- Secondary sign -->
  <rect x="310" y="210" width="180" height="50" rx="6" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.7"/>
  <text x="400" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#00f0ff">TOKYO</text>
  <!-- Accent neon lines -->
  <line x1="300" y1="290" x2="500" y2="290" stroke="#bc13fe" stroke-width="2" opacity="0.5"/>
  <line x1="320" y1="300" x2="480" y2="300" stroke="#bc13fe" stroke-width="1" opacity="0.3"/>
  <!-- Vertical neon accents on buildings -->
  <line x1="190" y1="225" x2="190" y2="395" stroke="#ff1493" stroke-width="1.5" opacity="0.3"/>
  <line x1="600" y1="215" x2="600" y2="395" stroke="#00f0ff" stroke-width="1.5" opacity="0.3"/>
</svg>