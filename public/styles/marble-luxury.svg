  <rect x="385" y="100" width="30" height="30" transform="rotate(45 400 115)" fill="none" stroke="#c9a96e" stroke-width="1.5"/>
  <!-- Style name -->
  <text x="400" y="210" text-anchor="middle" font-family="Georgia, serif" font-size="48" fill="#1a1a1a" letter-spacing="12">MARBLE</text>
  <text x="400" y="260" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#c9a96e" letter-spacing="16">LUXURY</text>
