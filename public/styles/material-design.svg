<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <filter id="dp1">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="rgba(0,0,0,0.20)"/>
    </filter>
    <filter id="dp2">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.20)"/>
    </filter>
    <filter id="dp4">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="rgba(0,0,0,0.20)"/>
    </filter>
    <filter id="dp8">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="rgba(0,0,0,0.24)"/>
    </filter>
    <filter id="fab-shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="rgba(3,218,198,0.40)"/>
    </filter>
    <filter id="appbar-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="rgba(0,0,0,0.30)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#fafafa"/>

  <!-- Status bar -->
  <rect x="0" y="0" width="1200" height="24" fill="#3700b3"/>
  <text x="20" y="16" font-family="Roboto, sans-serif" font-size="11" fill="rgba(255,255,255,0.9)" font-weight="500">9:41</text>
  <text x="1180" y="16" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.9)" text-anchor="end">&#9679;&#9679;&#9679;</text>

  <!-- App Bar -->
  <rect x="0" y="24" width="1200" height="56" fill="#6200ee" filter="url(#appbar-shadow)"/>
  <!-- Hamburger icon -->
  <line x1="26" y1="44" x2="50" y2="44" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="26" y1="52" x2="50" y2="52" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="26" y1="60" x2="50" y2="60" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Title -->
  <text x="76" y="59" font-family="Roboto, sans-serif" font-size="20" font-weight="500" fill="white">StyleKit</text>
  <!-- Search icon -->
  <circle cx="1130" cy="52" r="9" fill="none" stroke="white" stroke-width="2"/>
  <line x1="1136" y1="58" x2="1144" y2="66" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- More (vertical dots) -->
  <circle cx="1170" cy="46" r="2.5" fill="white"/>
  <circle cx="1170" cy="52" r="2.5" fill="white"/>
  <circle cx="1170" cy="58" r="2.5" fill="white"/>

  <!-- Section label -->
  <text x="60" y="118" font-family="Roboto, sans-serif" font-size="12" font-weight="500" fill="#6200ee" letter-spacing="1.5">ELEVATION SYSTEM</text>

  <!-- Card DP=1 (top-left) -->
  <rect x="60" y="128" width="240" height="140" rx="4" fill="white" filter="url(#dp1)"/>
  <text x="80" y="156" font-family="Roboto, sans-serif" font-size="13" font-weight="500" fill="#1a1a1a">Elevation 1dp</text>
  <rect x="80" y="166" width="60" height="6" rx="3" fill="#e0e0e0"/>
  <rect x="80" y="178" width="120" height="6" rx="3" fill="#e0e0e0"/>
  <rect x="80" y="190" width="90" height="6" rx="3" fill="#e0e0e0"/>
  <rect x="80" y="210" width="80" height="28" rx="4" fill="#6200ee"/>
  <text x="120" y="229" font-family="Roboto, sans-serif" font-size="12" font-weight="500" fill="white" text-anchor="middle">ACTION</text>
  <text x="80" y="256" font-family="Roboto, sans-serif" font-size="10" fill="#9e9e9e">0 1px 2px rgba(0,0,0,.2)</text>

  <!-- Card DP=2 (top-right) -->
  <rect x="340" y="128" width="240" height="140" rx="4" fill="white" filter="url(#dp2)"/>
  <text x="360" y="156" font-family="Roboto, sans-serif" font-size="13" font-weight="500" fill="#1a1a1a">Elevation 2dp</text>
  <rect x="360" y="166" width="60" height="6" rx="3" fill="#e0e0e0"/>
  <rect x="360" y="178" width="120" height="6" rx="3" fill="#e0e0e0"/>
  <rect x="360" y="190" width="90" height="6" rx="3" fill="#e0e0e0"/>
  <rect x="360" y="210" width="80" height="28" rx="4" fill="#6200ee"/>
  <text x="400" y="229" font-family="Roboto, sans-serif" font-size="12" font-weight="500" fill="white" text-anchor="middle">ACTION</text>
  <text x="360" y="256" font-family="Roboto, sans-serif" font-size="10" fill="#9e9e9e">0 2px 4px rgba(0,0,0,.2)</text>

  <!-- Card DP=4 (bottom-left) -->
  <rect x="60" y="292" width="240" height="140" rx="4" fill="white" filter="url(#dp4)"/>
  <text x="80" y="320" font-family="Roboto, sans-serif" font-size="13" font-weight="500" fill="#1a1a1a">Elevation 4dp</text>
  <rect x="80" y="330" width="60" height="6" rx="3" fill="#e0e0e0"/>
  <rect x="80" y="342" width="120" height="6" rx="3" fill="#e0e0e0"/>
  <rect x="80" y="354" width="90" height="6" rx="3" fill="#e0e0e0"/>
  <rect x="80" y="374" width="80" height="28" rx="4" fill="#6200ee"/>
  <text x="120" y="393" font-family="Roboto, sans-serif" font-size="12" font-weight="500" fill="white" text-anchor="middle">ACTION</text>
  <text x="80" y="420" font-family="Roboto, sans-serif" font-size="10" fill="#9e9e9e">0 4px 8px rgba(0,0,0,.2)</text>

  <!-- Card DP=8 (bottom-right) -->
  <rect x="340" y="292" width="240" height="140" rx="4" fill="white" filter="url(#dp8)"/>
  <text x="360" y="320" font-family="Roboto, sans-serif" font-size="13" font-weight="500" fill="#1a1a1a">Elevation 8dp</text>
  <rect x="360" y="330" width="60" height="6" rx="3" fill="#e0e0e0"/>
  <rect x="360" y="342" width="120" height="6" rx="3" fill="#e0e0e0"/>
  <rect x="360" y="354" width="90" height="6" rx="3" fill="#e0e0e0"/>
  <rect x="360" y="374" width="80" height="28" rx="4" fill="#6200ee"/>
  <text x="400" y="393" font-family="Roboto, sans-serif" font-size="12" font-weight="500" fill="white" text-anchor="middle">ACTION</text>
  <text x="360" y="420" font-family="Roboto, sans-serif" font-size="10" fill="#9e9e9e">0 8px 16px rgba(0,0,0,.24)</text>

  <!-- Typography overlay (center-right) -->
  <text x="900" y="215" font-family="Roboto, sans-serif" font-size="60" font-weight="700" fill="#6200ee" text-anchor="middle">Material</text>
  <text x="900" y="283" font-family="Roboto, sans-serif" font-size="60" font-weight="700" fill="#6200ee" text-anchor="middle">Design</text>
  <text x="900" y="328" font-family="Roboto, sans-serif" font-size="16" font-weight="400" fill="#03dac6" text-anchor="middle" letter-spacing="2">Elevation . Components . Motion</text>

  <!-- Color chips -->
  <rect x="680" y="365" width="78" height="78" rx="4" fill="#6200ee" filter="url(#dp2)"/>
  <text x="719" y="395" font-family="Roboto, sans-serif" font-size="9" fill="white" text-anchor="middle">Primary</text>
  <text x="719" y="408" font-family="Roboto, sans-serif" font-size="9" fill="rgba(255,255,255,0.8)" text-anchor="middle">#6200EE</text>

  <rect x="778" y="365" width="78" height="78" rx="4" fill="#3700b3" filter="url(#dp2)"/>
  <text x="817" y="395" font-family="Roboto, sans-serif" font-size="9" fill="white" text-anchor="middle">Primary Dk</text>
  <text x="817" y="408" font-family="Roboto, sans-serif" font-size="9" fill="rgba(255,255,255,0.8)" text-anchor="middle">#3700B3</text>

  <rect x="876" y="365" width="78" height="78" rx="4" fill="#03dac6" filter="url(#dp2)"/>
  <text x="915" y="395" font-family="Roboto, sans-serif" font-size="9" fill="#000000" text-anchor="middle">Secondary</text>
  <text x="915" y="408" font-family="Roboto, sans-serif" font-size="9" fill="rgba(0,0,0,0.7)" text-anchor="middle">#03DAC6</text>

  <rect x="974" y="365" width="78" height="78" rx="4" fill="#cf6679" filter="url(#dp2)"/>
  <text x="1013" y="395" font-family="Roboto, sans-serif" font-size="9" fill="white" text-anchor="middle">Error</text>
  <text x="1013" y="408" font-family="Roboto, sans-serif" font-size="9" fill="rgba(255,255,255,0.8)" text-anchor="middle">#CF6679</text>

  <rect x="1072" y="365" width="78" height="78" rx="4" fill="white" filter="url(#dp4)"/>
  <text x="1111" y="395" font-family="Roboto, sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle">Surface</text>
  <text x="1111" y="408" font-family="Roboto, sans-serif" font-size="9" fill="#757575" text-anchor="middle">#FFFFFF</text>

  <!-- FAB button -->
  <circle cx="1140" cy="488" r="28" fill="#03dac6" filter="url(#fab-shadow)"/>
  <line x1="1140" y1="474" x2="1140" y2="502" stroke="#000000" stroke-width="3" stroke-linecap="round"/>
  <line x1="1126" y1="488" x2="1154" y2="488" stroke="#000000" stroke-width="3" stroke-linecap="round"/>

  <!-- Bottom Navigation Bar -->
  <rect x="0" y="540" width="1200" height="90" fill="white" filter="url(#dp8)"/>
  <line x1="0" y1="540" x2="1200" y2="540" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Home tab (active) -->
  <g transform="translate(150, 557)">
    <polygon points="0,-13 -13,0 -9,0 -9,11 9,11 9,0 13,0" fill="#6200ee"/>
    <text x="0" y="30" font-family="Roboto, sans-serif" font-size="12" font-weight="500" fill="#6200ee" text-anchor="middle">Home</text>
  </g>

  <!-- Search tab (inactive) -->
  <g transform="translate(450, 557)">
    <circle cx="0" cy="-5" r="9" fill="none" stroke="#757575" stroke-width="2"/>
    <line x1="6" y1="2" x2="13" y2="9" stroke="#757575" stroke-width="2" stroke-linecap="round"/>
    <text x="0" y="30" font-family="Roboto, sans-serif" font-size="12" fill="#757575" text-anchor="middle">Search</text>
  </g>

  <!-- Favorites tab (inactive) -->
  <g transform="translate(750, 557)">
    <polygon points="0,-15 4,-6 14,-5 6,2 9,13 0,7 -9,13 -6,2 -14,-5 -4,-6" fill="none" stroke="#757575" stroke-width="2"/>
    <text x="0" y="30" font-family="Roboto, sans-serif" font-size="12" fill="#757575" text-anchor="middle">Favorites</text>
  </g>

  <!-- Profile tab (inactive) -->
  <g transform="translate(1050, 557)">
    <circle cx="0" cy="-10" r="7" fill="none" stroke="#757575" stroke-width="2"/>
    <path d="M -13,7 C -13,-2 13,-2 13,7" fill="none" stroke="#757575" stroke-width="2"/>
    <text x="0" y="30" font-family="Roboto, sans-serif" font-size="12" fill="#757575" text-anchor="middle">Profile</text>
  </g>
</svg>
