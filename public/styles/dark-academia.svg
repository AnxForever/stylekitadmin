<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <!-- Noise texture -->
    <pattern id="noise" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="none"/>
      <circle cx="1" cy="1" r="0.4" fill="#3d2010" opacity="0.35"/>
      <circle cx="3" cy="3" r="0.35" fill="#2c1810" opacity="0.28"/>
      <circle cx="2" cy="0.5" r="0.3" fill="#3d2010" opacity="0.22"/>
      <circle cx="0.5" cy="3" r="0.3" fill="#2c1810" opacity="0.2"/>
    </pattern>

    <!-- Candlelight ambient glow -->
    <radialGradient id="ambientGlow" cx="50%" cy="52%" r="52%" fx="50%" fy="52%">
      <stop offset="0%" stop-color="#c9a85c" stop-opacity="0.22"/>
      <stop offset="30%" stop-color="#8b6914" stop-opacity="0.12"/>
      <stop offset="65%" stop-color="#4a2a0a" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#1a0e08" stop-opacity="0"/>
    </radialGradient>

    <!-- Candle flame gradient -->
    <radialGradient id="flameCore" cx="50%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#fff8e0" stop-opacity="1"/>
      <stop offset="40%" stop-color="#ffcc44" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0.7"/>
    </radialGradient>

    <!-- Candle halo -->
    <radialGradient id="flameHalo" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#c9a85c" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#8b6914" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1a0e08" stop-opacity="0"/>
    </radialGradient>

    <!-- Drop shadow filter -->
    <filter id="bookShadow" x="-5%" y="-5%" width="115%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="3" result="shadow"/>
      <feFlood flood-color="#0a0602" flood-opacity="0.6"/>
      <feComposite in2="shadow" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Parchment texture -->
    <filter id="parchmentFilter">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blend"/>
      <feComponentTransfer in="blend">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>

    <!-- Soft glow filter -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Arch clip -->
    <clipPath id="archClip">
      <rect x="0" y="0" width="1200" height="320"/>
    </clipPath>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="#1a0e08"/>
  <!-- Noise overlay -->
  <rect width="1200" height="630" fill="url(#noise)" opacity="0.8"/>

  <!-- Atmospheric fog — wide amber ellipses at very low opacity -->
  <ellipse cx="600" cy="310" rx="520" ry="220" fill="#c9a85c" opacity="0.045" filter="url(#glow)"/>
  <ellipse cx="600" cy="340" rx="360" ry="160" fill="#8b6914" opacity="0.06" filter="url(#glow)"/>

  <!-- Gothic arch left -->
  <path d="M60,320 L60,160 Q60,60 160,60 Q260,60 260,160 L260,320 Z" fill="none" stroke="#2c1810" stroke-width="18" opacity="0.9"/>
  <path d="M60,320 L60,160 Q60,60 160,60 Q260,60 260,160 L260,320 Z" fill="none" stroke="#c9a85c" stroke-width="1.2" opacity="0.35"/>
  <!-- Arch inner detail left -->
  <path d="M82,320 L82,168 Q82,82 160,82 Q238,82 238,168 L238,320 Z" fill="none" stroke="#c9a85c" stroke-width="0.6" opacity="0.2"/>

  <!-- Gothic arch right -->
  <path d="M940,320 L940,160 Q940,60 1040,60 Q1140,60 1140,160 L1140,320 Z" fill="none" stroke="#2c1810" stroke-width="18" opacity="0.9"/>
  <path d="M940,320 L940,160 Q940,60 1040,60 Q1140,60 1140,160 L1140,320 Z" fill="none" stroke="#c9a85c" stroke-width="1.2" opacity="0.35"/>
  <!-- Arch inner detail right -->
  <path d="M962,320 L962,168 Q962,82 1040,82 Q1118,82 1118,168 L1118,320 Z" fill="none" stroke="#c9a85c" stroke-width="0.6" opacity="0.2"/>

  <!-- Stone columns — tall thin rects -->
  <rect x="48" y="0" width="24" height="630" fill="#0d0d0d" opacity="0.75"/>
  <rect x="68" y="0" width="4" height="630" fill="#1a1210" opacity="0.5"/>
  <rect x="1128" y="0" width="24" height="630" fill="#0d0d0d" opacity="0.75"/>
  <rect x="1128" y="0" width="4" height="630" fill="#1a1210" opacity="0.5"/>

  <!-- Bookshelf floor line -->
  <rect x="0" y="592" width="1200" height="38" fill="#0d0805"/>
  <!-- Shelf plank -->
  <rect x="0" y="580" width="1200" height="14" fill="#2c1810"/>
  <rect x="0" y="580" width="1200" height="2" fill="#c9a85c" opacity="0.15"/>

  <!-- === BOOKS === -->
  <!-- Book group left cluster -->
  <rect x="90" y="350" width="28" height="235" fill="#5c1a1a" filter="url(#bookShadow)"/>
  <rect x="91" y="352" width="2" height="231" fill="#c9a85c" opacity="0.18"/>
  <rect x="105" y="352" width="1" height="231" fill="#c9a85c" opacity="0.1"/>

  <rect x="120" y="370" width="22" height="215" fill="#1a3d2b" filter="url(#bookShadow)"/>
  <rect x="121" y="372" width="2" height="211" fill="#c9a85c" opacity="0.15"/>

  <rect x="144" y="340" width="32" height="245" fill="#4a2a0a" filter="url(#bookShadow)"/>
  <rect x="145" y="342" width="3" height="241" fill="#8b6914" opacity="0.2"/>
  <rect x="158" y="342" width="1" height="241" fill="#c9a85c" opacity="0.12"/>

  <rect x="178" y="395" width="18" height="190" fill="#0a0a0a" filter="url(#bookShadow)"/>
  <rect x="179" y="397" width="1.5" height="186" fill="#c9a85c" opacity="0.1"/>

  <rect x="198" y="360" width="26" height="225" fill="#5c1a1a" opacity="0.85" filter="url(#bookShadow)"/>
  <rect x="199" y="362" width="2" height="221" fill="#c9a85c" opacity="0.14"/>

  <rect x="226" y="380" width="20" height="205" fill="#2a1a3d" filter="url(#bookShadow)"/>

  <rect x="248" y="345" width="30" height="240" fill="#3d1a00" filter="url(#bookShadow)"/>
  <rect x="249" y="347" width="3" height="236" fill="#8b6914" opacity="0.22"/>

  <!-- Book group right cluster -->
  <rect x="882" y="345" width="30" height="240" fill="#1a3d2b" filter="url(#bookShadow)"/>
  <rect x="883" y="347" width="3" height="236" fill="#c9a85c" opacity="0.16"/>
  <rect x="896" y="347" width="1" height="236" fill="#c9a85c" opacity="0.1"/>

  <rect x="914" y="365" width="24" height="220" fill="#5c1a1a" filter="url(#bookShadow)"/>
  <rect x="915" y="367" width="2" height="216" fill="#c9a85c" opacity="0.15"/>

  <rect x="940" y="350" width="28" height="235" fill="#4a2a0a" filter="url(#bookShadow)"/>
  <rect x="941" y="352" width="3" height="231" fill="#8b6914" opacity="0.2"/>

  <rect x="970" y="390" width="20" height="195" fill="#0a0a0a" filter="url(#bookShadow)"/>
  <rect x="971" y="392" width="1.5" height="191" fill="#c9a85c" opacity="0.08"/>

  <rect x="992" y="355" width="26" height="230" fill="#5c1a1a" opacity="0.85" filter="url(#bookShadow)"/>
  <rect x="993" y="357" width="2" height="226" fill="#c9a85c" opacity="0.14"/>

  <rect x="1020" y="375" width="22" height="210" fill="#2a3d1a" filter="url(#bookShadow)"/>

  <rect x="1044" y="340" width="32" height="245" fill="#3d1a00" filter="url(#bookShadow)"/>
  <rect x="1045" y="342" width="3" height="241" fill="#8b6914" opacity="0.2"/>

  <rect x="1078" y="370" width="22" height="215" fill="#1a1a3d" filter="url(#bookShadow)"/>

  <!-- Ambient candlelight radial over scene -->
  <rect width="1200" height="630" fill="url(#ambientGlow)"/>

  <!-- Candle body (center) -->
  <rect x="592" y="500" width="16" height="68" fill="#d4b896" rx="1"/>
  <!-- Wax drip -->
  <path d="M596 500 Q594 492 595 488" stroke="#d4b896" stroke-width="2.5" fill="none" opacity="0.6"/>
  <!-- Wick -->
  <line x1="600" y1="500" x2="600" y2="492" stroke="#2c1810" stroke-width="1.5"/>

  <!-- Candle flame halo (large, blurred) -->
  <ellipse cx="600" cy="480" rx="80" ry="70" fill="url(#flameHalo)" opacity="0.9"/>

  <!-- Candle flame shape -->
  <path d="M600,466 C594,474 590,482 595,490 C597,493 603,493 605,490 C610,482 606,474 600,466 Z" fill="url(#flameCore)" filter="url(#glow)" opacity="0.95"/>
  <!-- Flame inner bright core -->
  <ellipse cx="600" cy="487" rx="3" ry="4" fill="#fffbe8" opacity="0.9"/>

  <!-- Parchment text card -->
  <rect x="340" y="188" width="520" height="190" fill="#d4b896" rx="2" opacity="0.93" filter="url(#bookShadow)"/>
  <!-- Parchment outer border -->
  <rect x="340" y="188" width="520" height="190" fill="none" stroke="#4a3520" stroke-width="2.5" rx="2" opacity="0.7"/>
  <!-- Parchment inner border -->
  <rect x="352" y="200" width="496" height="166" fill="none" stroke="#8b6914" stroke-width="0.8" rx="1" opacity="0.5"/>
  <!-- Parchment corner ornaments -->
  <path d="M352,200 L368,200 M352,200 L352,216" stroke="#8b6914" stroke-width="1.5" opacity="0.55"/>
  <path d="M848,200 L832,200 M848,200 L848,216" stroke="#8b6914" stroke-width="1.5" opacity="0.55"/>
  <path d="M352,366 L368,366 M352,366 L352,350" stroke="#8b6914" stroke-width="1.5" opacity="0.55"/>
  <path d="M848,366 L832,366 M848,366 L848,350" stroke="#8b6914" stroke-width="1.5" opacity="0.55"/>

  <!-- Main title -->
  <text x="600" y="267" font-family="Georgia, serif" font-size="52" font-weight="700" fill="#2c1810" text-anchor="middle" letter-spacing="4">DARK ACADEMIA</text>
  <!-- Decorative rule -->
  <line x1="380" y1="284" x2="820" y2="284" stroke="#8b6914" stroke-width="1" opacity="0.6"/>
  <circle cx="600" cy="284" r="3" fill="#8b6914" opacity="0.6"/>
  <circle cx="440" cy="284" r="1.5" fill="#8b6914" opacity="0.4"/>
  <circle cx="760" cy="284" r="1.5" fill="#8b6914" opacity="0.4"/>
  <!-- Subtitle -->
  <text x="600" y="320" font-family="Georgia, serif" font-size="18" font-style="italic" fill="#4a3520" text-anchor="middle" letter-spacing="2" opacity="0.85">Knowledge in Candlelight</text>
  <!-- Bottom rule -->
  <line x1="420" y1="342" x2="780" y2="342" stroke="#8b6914" stroke-width="0.7" opacity="0.45"/>

  <!-- Outer frame -->
  <rect x="22" y="22" width="1156" height="586" fill="none" stroke="#c9a85c" stroke-width="1" opacity="0.18" rx="1"/>
</svg>
