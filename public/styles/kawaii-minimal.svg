<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="pinkPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F9A8D4"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>
    <linearGradient id="softBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCE7F3"/>
      <stop offset="50%" stop-color="#EDE9FE"/>
      <stop offset="100%" stop-color="#CFFAFE"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="#FFF7ED"/>
  <!-- Nav -->
  <rect x="0" y="0" width="1200" height="56" fill="white" opacity=".8"/>
  <line x1="0" y1="56" x2="1200" y2="56" stroke="#FCE7F3"/>
  <circle cx="50" cy="28" r="16" fill="url(#pinkPurple)"/>
  <text x="78" y="33" fill="#1F2937" font-family="sans-serif" font-size="14" font-weight="600">Kawaii Minimal</text>
  <text x="1060" y="33" fill="#9CA3AF" font-family="sans-serif" font-size="12">All Styles</text>
  <!-- Hero -->
  <rect x="350" y="90" width="160" height="28" rx="14" fill="#FCE7F3"/>
  <text x="392" y="109" fill="#EC4899" font-family="sans-serif" font-size="11" font-weight="500">Kawaii Design System</text>
  <text x="600" y="170" fill="#1F2937" font-family="sans-serif" font-size="48" font-weight="700" text-anchor="middle">Cute &amp;</text>
  <text x="600" y="220" fill="url(#pinkPurple)" font-family="sans-serif" font-size="48" font-weight="700" text-anchor="middle">Minimal</text>
  <text x="600" y="260" fill="#6B7280" font-family="sans-serif" font-size="14" text-anchor="middle">A gentle blend of kawaii culture and minimalist design.</text>
  <!-- Hero buttons -->
  <rect x="430" y="285" width="150" height="44" rx="22" fill="url(#pinkPurple)"/>
  <text x="475" y="312" fill="white" font-family="sans-serif" font-size="14" font-weight="500">Get Started</text>
  <rect x="600" y="285" width="150" height="44" rx="22" fill="white" stroke="#FBCFE8" stroke-width="2"/>
  <text x="640" y="312" fill="#EC4899" font-family="sans-serif" font-size="14" font-weight="500">Learn More</text>
  <!-- Feature Cards -->
  <rect x="80" y="360" width="320" height="180" rx="24" fill="white" stroke="#FCE7F3"/>
  <rect x="105" y="385" width="48" height="48" rx="16" fill="#FDE68A"/>
  <text x="105" y="460" fill="#1F2937" font-family="sans-serif" font-size="18" font-weight="600">Bright &amp; Warm</text>
  <text x="105" y="482" fill="#6B7280" font-family="sans-serif" font-size="12">Warm backgrounds with pastel accents</text>
  <text x="105" y="498" fill="#6B7280" font-family="sans-serif" font-size="12">create a welcoming atmosphere.</text>
  <rect x="430" y="360" width="320" height="180" rx="24" fill="white" stroke="#FCE7F3"/>
  <rect x="455" y="385" width="48" height="48" rx="16" fill="#FBCFE8"/>
  <text x="455" y="460" fill="#1F2937" font-family="sans-serif" font-size="18" font-weight="600">Soft &amp; Round</text>
  <text x="455" y="482" fill="#6B7280" font-family="sans-serif" font-size="12">Large rounded corners and circular</text>
  <text x="455" y="498" fill="#6B7280" font-family="sans-serif" font-size="12">elements bring a friendly feel.</text>
  <rect x="780" y="360" width="320" height="180" rx="24" fill="white" stroke="#FCE7F3"/>
  <rect x="805" y="385" width="48" height="48" rx="16" fill="#DDD6FE"/>
  <text x="805" y="460" fill="#1F2937" font-family="sans-serif" font-size="18" font-weight="600">Playful Motion</text>
  <text x="805" y="482" fill="#6B7280" font-family="sans-serif" font-size="12">Bouncy hover effects and gentle</text>
  <text x="805" y="498" fill="#6B7280" font-family="sans-serif" font-size="12">transitions add delight.</text>
  <!-- Color palette -->
  <rect x="80" y="570" width="80" height="40" rx="12" fill="#FFF7ED" stroke="#FCE7F3"/>
  <rect x="170" y="570" width="80" height="40" rx="12" fill="#F9A8D4"/>
  <rect x="260" y="570" width="80" height="40" rx="12" fill="#C4B5FD"/>
  <rect x="350" y="570" width="80" height="40" rx="12" fill="#67E8F9"/>
  <rect x="440" y="570" width="80" height="40" rx="12" fill="#FDE68A"/>
  <rect x="530" y="570" width="80" height="40" rx="12" fill="#FCE7F3"/>
  <rect x="620" y="570" width="80" height="40" rx="12" fill="#EDE9FE"/>
  <!-- Badges -->
  <rect x="750" y="575" width="70" height="28" rx="14" fill="#FCE7F3"/>
  <text x="766" y="593" fill="#EC4899" font-family="sans-serif" font-size="10" font-weight="500">Kawaii</text>
  <rect x="830" y="575" width="75" height="28" rx="14" fill="#EDE9FE"/>
  <text x="845" y="593" fill="#8B5CF6" font-family="sans-serif" font-size="10" font-weight="500">Minimal</text>
  <rect x="915" y="575" width="60" height="28" rx="14" fill="#CFFAFE"/>
  <text x="932" y="593" fill="#06B6D4" font-family="sans-serif" font-size="10" font-weight="500">Fresh</text>
  <rect x="985" y="575" width="65" height="28" rx="14" fill="#FEF3C7"/>
  <text x="1000" y="593" fill="#D97706" font-family="sans-serif" font-size="10" font-weight="500">Warm</text>
</svg>