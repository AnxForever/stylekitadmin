<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f0e6d0"/>
  <!-- Aged paper texture effect -->
  <rect width="800" height="400" fill="#e8dcc4" opacity="0.3"/>
  <!-- Ornate outer border -->
  <rect x="20" y="20" width="760" height="360" fill="none" stroke="#8b1a1a" stroke-width="3"/>
  <rect x="28" y="28" width="744" height="344" fill="none" stroke="#c9a74e" stroke-width="1.5"/>
  <rect x="34" y="34" width="732" height="332" fill="none" stroke="#8b1a1a" stroke-width="1"/>
  <!-- Corner ornaments -->
  <g transform="translate(40,40)">
    <path d="M0,0 L30,0 L30,5 L5,5 L5,30 L0,30 Z" fill="#c9a74e"/>
    <circle cx="15" cy="15" r="4" fill="#8b1a1a"/>
  </g>
  <g transform="translate(760,40) scale(-1,1)">
    <path d="M0,0 L30,0 L30,5 L5,5 L5,30 L0,30 Z" fill="#c9a74e"/>
    <circle cx="15" cy="15" r="4" fill="#8b1a1a"/>
  </g>
  <g transform="translate(40,360) scale(1,-1)">
    <path d="M0,0 L30,0 L30,5 L5,5 L5,30 L0,30 Z" fill="#c9a74e"/>
    <circle cx="15" cy="15" r="4" fill="#8b1a1a"/>
  </g>
  <g transform="translate(760,360) scale(-1,-1)">
    <path d="M0,0 L30,0 L30,5 L5,5 L5,30 L0,30 Z" fill="#c9a74e"/>
    <circle cx="15" cy="15" r="4" fill="#8b1a1a"/>
  </g>
  <!-- Illuminated letter area -->
  <rect x="80" y="80" width="140" height="160" fill="none" stroke="#c9a74e" stroke-width="2"/>
  <rect x="85" y="85" width="130" height="150" fill="#8b1a1a" opacity="0.08"/>
  <!-- Illuminated "M" -->
  <text x="150" y="200" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="120" fill="#8b1a1a" font-weight="bold">M</text>
  <!-- Gold leaf accent on letter -->
  <circle cx="115" cy="140" r="8" fill="#c9a74e" opacity="0.6"/>
  <circle cx="185" cy="140" r="8" fill="#c9a74e" opacity="0.6"/>
  <!-- Vine/scroll decorations along left border -->
  <path d="M60,80 Q50,120 60,160 Q70,200 60,240 Q50,280 60,320" fill="none" stroke="#8b1a1a" stroke-width="1.5"/>
  <circle cx="60" cy="120" r="4" fill="#c9a74e" opacity="0.7"/>
  <circle cx="60" cy="200" r="4" fill="#c9a74e" opacity="0.7"/>
  <circle cx="60" cy="280" r="4" fill="#c9a74e" opacity="0.7"/>
  <!-- Simulated text lines -->
  <g fill="#8b1a1a" opacity="0.3">
    <rect x="250" y="90" width="480" height="4" rx="1"/>
    <rect x="250" y="110" width="460" height="4" rx="1"/>
    <rect x="250" y="130" width="490" height="4" rx="1"/>
    <rect x="250" y="150" width="440" height="4" rx="1"/>
    <rect x="250" y="170" width="475" height="4" rx="1"/>
    <rect x="250" y="190" width="450" height="4" rx="1"/>
    <rect x="250" y="210" width="485" height="4" rx="1"/>
    <rect x="250" y="230" width="430" height="4" rx="1"/>
    <rect x="80" y="260" width="650" height="4" rx="1"/>
    <rect x="80" y="280" width="660" height="4" rx="1"/>
    <rect x="80" y="300" width="630" height="4" rx="1"/>
    <rect x="80" y="320" width="640" height="4" rx="1"/>
  </g>
  <!-- Cross decorations in margin -->
  <g transform="translate(740,100)" fill="#c9a74e">
    <rect x="-2" y="-8" width="4" height="16"/>
    <rect x="-8" y="-2" width="16" height="4"/>
  </g>
  <g transform="translate(740,200)" fill="#c9a74e">
    <rect x="-2" y="-8" width="4" height="16"/>
    <rect x="-8" y="-2" width="16" height="4"/>
  </g>
  <g transform="translate(740,300)" fill="#c9a74e">
    <rect x="-2" y="-8" width="4" height="16"/>
    <rect x="-8" y="-2" width="16" height="4"/>
  </g>
  <!-- Title -->
  <text x="400" y="380" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="16" fill="#8b1a1a" font-style="italic" letter-spacing="2">Medieval Manuscript</text>
</svg>